<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Result - Resume Screener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container result-container">
        <h1>Analysis Result</h1>

        <div class="gauge" style="--score: {{ score }}">
            <div class="gauge-inner">
                <span class="gauge-value">{{ score }}%</span>
                <span class="gauge-label">Match Score</span>
            </div>
        </div>

        <div class="verdict verdict-{{ verdict.level }}">
            <i class="fa-solid {% if verdict.level == 'good' %}fa-circle-check{% elif verdict.level == 'moderate' %}fa-triangle-exclamation{% else %}fa-circle-xmark{% endif %}"></i>
            <div>
                <strong>{{ verdict.label }}</strong>
                <p>{{ verdict.message }}</p>
            </div>
        </div>

        <a href="/" class="btn-secondary"><i class="fa-solid fa-arrow-rotate-left"></i> Try Another Resume</a>
    </div>
</body>
</html>
